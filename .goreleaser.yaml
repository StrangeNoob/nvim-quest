# GoReleaser configuration — https://goreleaser.com
# Cross-platform release builds, triggered on tag push by .github/workflows/release.yml.
version: 2

project_name: nvim-quest

before:
  hooks:
    - go mod tidy

builds:
  - id: nvim-quest
    main: .
    binary: nvim-quest
    # Pure Go: disable CGO so cross-compilation works without C toolchains.
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    ids:
      - nvim-quest
    name_template: "nvim-quest_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
